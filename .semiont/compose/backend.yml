# Semiont backend with Neo4j and PostgreSQL
#
# Usage:
#   export ANTHROPIC_API_KEY=<your-key>
#   docker compose -f .semiont/compose/backend.yml up
#
# Admin credentials default to admin@example.com / password.
# Override with ADMIN_EMAIL and ADMIN_PASSWORD env vars.

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/localpass
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: semiont
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: .semiont/containers/Dockerfile.backend
    ports:
      - "4000:4000"
    volumes:
      - ../..:/kb
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POSTGRES_HOST: postgres
      NEO4J_HOST: neo4j
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
